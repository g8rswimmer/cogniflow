# Map the HTTP Upgrade header to the correct Connection value so that nginx
# correctly proxies WebSocket connections (run event streams).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # SPA routing — serve index.html for all paths that don't resolve to a
    # static file so that React Router handles client-side navigation.
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # index.html must never be cached: it references hashed asset filenames
    # that change on every build. Without this, browsers serve a stale
    # index.html that points to JS/CSS files that no longer exist in the
    # container after a rebuild, silently running old code.
    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
    }

    # Hashed static assets (JS/CSS bundles) are content-addressed and safe
    # to cache indefinitely — a new build produces new filenames.
    location /assets/ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Versioned API and WebSocket traffic.
    # Run-event streams (/v1/runs/*/events) use WebSocket; the Upgrade and
    # Connection headers enable transparent proxying of those connections.
    # proxy_read_timeout is extended so long-running runs don't get cut off.
    location /v1/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }

    # Health check endpoint (unversioned).
    location /health {
        proxy_pass http://backend:8080;
    }

    # Unversioned admin endpoints (log-level, etc.).
    location /admin/ {
        proxy_pass       http://backend:8080;
        proxy_set_header Host $host;
    }
}
